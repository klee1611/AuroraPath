name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --forceExit
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          # Auth0 — dummy values satisfy Next.js build (no real requests made)
          AUTH0_SECRET: ci-placeholder-secret-32-chars-long!!
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://placeholder.auth0.com
          AUTH0_CLIENT_ID: ci-placeholder-client-id
          AUTH0_CLIENT_SECRET: ci-placeholder-client-secret
          AUTH0_M2M_AUDIENCE: https://aurorapath.api
          AUTH0_M2M_CLIENT_ID: ci-placeholder-m2m-id
          AUTH0_M2M_CLIENT_SECRET: ci-placeholder-m2m-secret
          # Gemini — not called during build
          GEMINI_API_KEY: ci-placeholder-gemini-key
          # Mapbox — empty is fine for static build
          NEXT_PUBLIC_MAPBOX_TOKEN: ""
